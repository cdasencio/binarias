<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BLITZ PRO PANEL</title>

<style>
body{
  margin:0;
  background:#0b1220;
  font-family:Arial;
  color:white;
}

.container{
  display:grid;
  grid-template-rows: 70vh 30vh;
  gap:8px;
  padding:8px;
}

.card{
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

.scroll{
  width:100%;
  height:100%;
  overflow:auto;
}

.frame{
  width:2000px;
  height:1200px;
  border:none;
}

.panel{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  align-items:center;
  text-align:center;
}

.buy{color:#22c55e;}
.sell{color:#ef4444;}
.wait{color:#facc15;}
.ready{color:#60a5fa;}

.timer{
  font-size:50px;
  font-weight:bold;
}

h2{margin:5px 0;}

select{
  padding:6px;
  border-radius:6px;
  background:#0b1220;
  color:white;
  border:1px solid #333;
}
</style>

</head>

<body>

<div class="container">

<!-- CHART / BROKER -->
<div class="card">
  <div class="scroll">
    <iframe src="https://iqoption.com" class="frame"></iframe>
  </div>
</div>

<!-- PANEL -->
<div class="card panel">

  <div>
    <h2>PAR</h2>
    <select id="pair">
      <option>EURUSD</option>
      <option>GBPUSD</option>
      <option>USDJPY</option>
      <option>GBPJPY</option>
      <option>AUDJPY</option>
      <option>AUDCAD</option>
      <option>GBPCAD</option>
      <option>EURGBP</option>
      <option>EURAUD</option>
    </select>
  </div>

  <div>
    <h2>SEÑAL</h2>
    <div id="signal" class="wait">ESPERANDO</div>
  </div>

  <div>
    <h2>ENTRADA</h2>
    <div id="entry">--</div>
  </div>

  <div>
    <h2>TIEMPO</h2>
    <div class="timer" id="timer">60</div>
  </div>

</div>

</div>

<script>

let tiempo = 60;
let señal = null;

// normalizador fuerte
function clean(asset){
  return (asset || "")
    .toUpperCase()
    .replace("FX:","")
    .replace("/","");
}

// obtener señal backend
async function getSignal(){
  try{
    let r = await fetch("http://localhost:3000/senal");
    let d = await r.json();

    if(d){
      señal = {
        asset: clean(d.asset),
        signal: (d.signal || "").toUpperCase(),
        trend: (d.trend || "").toUpperCase(),
        utbot: (d.utbot || "").toUpperCase(),
        ema50: (d.ema50 || "").toUpperCase(),
        score: (d.score !== undefined ? Number(d.score) : null)
      };
    }

  }catch(e){}
}

setInterval(getSignal,1000);

// motor visual de decisión
function actualizar(){

  let pair = document.getElementById("pair").value;

  let txt = "NO OPERAR";
  let clase = "wait";
  let entry = "Esperando señal";

  if(señal && señal.asset === pair){

    let dir = señal.signal;
    let score = señal.score;

    // fallback si no hay score del backend
    if(score === null || isNaN(score)){

      score = 50;

      if(dir === "BUY" && señal.trend === "UP") score += 25;
      if(dir === "SELL" && señal.trend === "DOWN") score += 25;

      if(señal.utbot === dir) score += 15;
      if(señal.ema50 === dir) score += 15;

      if(señal.utbot !== dir) score -= 10;
      if(señal.ema50 !== dir) score -= 10;
    }

    let valido = score >= 72;
    let enVentana = (tiempo <= 8 && tiempo >= 2);

    if(valido && enVentana){

      txt = (dir === "BUY")
        ? "SUBE ⬆ CONFIRMADO"
        : "BAJA ⬇ CONFIRMADO";

      clase = (dir === "BUY") ? "buy" : "sell";
      entry = "ENTRADA ACTIVA";

    }
    else if(valido){

      txt = "PREPARADO ✔ (" + Math.floor(score) + "%)";
      clase = "ready";
      entry = "Esperar vela";

    }
    else{

      txt = "SIN SETUP (" + Math.floor(score) + "%)";
      clase = "wait";
      entry = "Mercado no válido";
    }

  }

  document.getElementById("signal").innerText = txt;
  document.getElementById("signal").className = clase;
  document.getElementById("entry").innerText = entry;
}

// timer
setInterval(()=>{

  tiempo--;
  if(tiempo <= 0) tiempo = 60;

  document.getElementById("timer").innerText = tiempo;

  actualizar();

},1000);

</script>

</body>
</html>
