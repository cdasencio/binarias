<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BLITZ PRO PANEL</title>

<style>
body{
  margin:0;
  background:#0b1220;
  font-family:Arial;
  color:white;
}

.container{
  display:grid;
  grid-template-rows: 70vh 30vh;
  gap:8px;
  padding:8px;
}

.card{
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

.scroll{
  width:100%;
  height:100%;
  overflow:auto;
}

.frame{
  width:2000px;
  height:1200px;
  border:none;
}

.panel{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  align-items:center;
  text-align:center;
}

.buy{color:#22c55e;}
.sell{color:#ef4444;}
.wait{color:#facc15;}
.ready{color:#60a5fa;}

.timer{
  font-size:50px;
  font-weight:bold;
}

h2{margin:5px 0;}

select{
  padding:6px;
  border-radius:6px;
  background:#0b1220;
  color:white;
  border:1px solid #333;
}
</style>

</head>

<body>

<div class="container">

<!-- BROKER / CHART -->
<div class="card">
  <div class="scroll">
    <iframe src="https://iqoption.com" class="frame"></iframe>
  </div>
</div>

<!-- PANEL -->
<div class="card panel">

  <div>
    <h2>PAR</h2>
    <select id="pair">
      <option>EURUSD</option>
      <option>GBPUSD</option>
      <option>USDJPY</option>
      <option>GBPJPY</option>
      <option>AUDJPY</option>
      <option>AUDCAD</option>
      <option>GBPCAD</option>
      <option>EURGBP</option>
      <option>EURAUD</option>
    </select>
  </div>

  <div>
    <h2>SEÑAL</h2>
    <div id="signal" class="wait">ESPERANDO</div>
  </div>

  <div>
    <h2>ENTRADA</h2>
    <div id="entry">--</div>
  </div>

  <div>
    <h2>TIEMPO</h2>
    <div class="timer" id="timer">60</div>
  </div>

</div>

</div>

<script>

let tiempo = 60;

// señal estructurada (AHORA con confirmaciones)
let señal = null;

// limpiar símbolo
function limpiar(asset){
  return asset.replace("FX:","").replace("/","");
}

// obtener señal backend (MEJORADA)
async function getSignal(){
  try{
    let r = await fetch("http://localhost:3000/senal");
    let d = await r.json();

    if(d.signal){
      señal = {
        asset: limpiar(d.asset),

        // dirección principal
        signal: d.signal, // BUY / SELL

        // 🔥 confirmaciones obligatorias
        trendM5: d.trendM5,   // "UP" / "DOWN"
        utbot: d.utbot,       // "BUY" / "SELL"
        ema50: d.ema50        // "BUY" / "SELL"
      };
    }

  }catch(e){}
}

setInterval(getSignal,1000);

// 🔥 lógica PRO (TRIPLE CONFIRMACIÓN)
function actualizar(){

  let pair = document.getElementById("pair").value;

  let txt = "NO OPERAR";
  let clase = "wait";
  let entry = "Esperando señal";

  if(señal && señal.asset === pair){

    let dir = señal.signal;

    let okTrend =
      (dir === "BUY" && señal.trendM5 === "UP") ||
      (dir === "SELL" && señal.trendM5 === "DOWN");

    let okUT = señal.utbot === dir;
    let okEMA = señal.ema50 === dir;

    let confirmacion = okTrend && okUT && okEMA;

    if(tiempo <= 8 && confirmacion){

      if(dir === "BUY"){
        txt = "SUBE ⬆ CONFIRMADO";
        clase = "buy";
      }

      if(dir === "SELL"){
        txt = "BAJA ⬇ CONFIRMADO";
        clase = "sell";
      }

      entry = "ENTRAR YA";

    } else if(confirmacion){

      txt = "PREPARADO ✔";
      clase = "ready";
      entry = "Esperar vela";

    } else {
      txt = "FILTRANDO...";
      clase = "wait";
      entry = "Sin confirmación";
    }
  }

  document.getElementById("signal").innerText = txt;
  document.getElementById("signal").className = clase;
  document.getElementById("entry").innerText = entry;
}

// timer
setInterval(()=>{
  tiempo--;
  if(tiempo <= 0) tiempo = 60;

  document.getElementById("timer").innerText = tiempo;

  actualizar();

},1000);

</script>

</body>
</html>
